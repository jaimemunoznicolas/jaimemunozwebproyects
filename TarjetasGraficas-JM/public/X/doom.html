<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zona secreta — DOOM clásico</title>

  <link rel="stylesheet" href="../css/styles.css" />
  <script src="../js/matrix.js" defer></script>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #111827 0, #020617 38%, #000000 100%);
      color: var(--text-main);
      font-family: "JetBrains Mono", monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .secret-wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .secret-card {
      width: 100%;
      max-width: 1000px;
      border-radius: 14px;
      background: radial-gradient(circle at top left, rgba(0,255,106,0.15), var(--bg-card));
      border: 1px solid var(--border-neon);
      box-shadow: var(--shadow-neon);
      padding: 2rem;
      text-align: center;
    }

    .doom-container {
      position: relative;
      width: 100%;
      height: 600px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid var(--accent-green);
      box-shadow: 0 0 20px rgba(0,255,106,0.4);
      background: black;
    }

    .doom-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .doom-exit {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
      padding: 6px 14px;
      font-size: 0.75rem;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
      color: #020617;
      font-weight: bold;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(0,255,106,0.7);
      transition: 0.2s ease;
    }

    .doom-exit:hover {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
      box-shadow: 0 0 18px rgba(39,226,255,0.9);
      transform: translateY(-2px);
    }

    .doom-hint {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }

    @media (max-width: 768px) {
      .doom-container {
        height: 420px;
      }
    }

    @media (max-width: 480px) {
      .doom-container {
        height: 340px;
      }
    }
  </style>
</head>

<body>
  <main class="secret-wrapper fade-in">
    <div class="secret-card">
      <h1 class="hacker-prefix mb-3">Zona secreta</h1>
      <p class="section-subtitle mb-4">DOOM clásico con sonido</p>

      <div class="doom-container">
        <button class="doom-exit" onclick="window.location.href='menusecreto.html'">Salir</button>
        <iframe
          src="https://archive.org/embed/doom-play"
          class="doom-frame"
          allow="autoplay; fullscreen"
          loading="lazy"
        ></iframe>
      </div>

      <p class="doom-hint">
        Usa las teclas para moverte. El sonido está activado.  
        Puedes cerrar el juego en cualquier momento con el botón superior.
      </p>
    </div>
  </main>
</body>
</html>

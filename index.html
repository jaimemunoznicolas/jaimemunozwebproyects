<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaime Muñoz - Portafolio de Proyectos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <div class="container">
    <header>
      <div class="avatar" id="avatar" role="button" tabindex="0">
        <div class="avatar-inner" id="avatarInner">
          <span class="avatar-letters">JM</span>
          <img src="Curriculum/foto.png" alt="Jaime Muñoz" class="avatar-photo" id="avatarPhoto">
        </div>
      </div>
      <h1>Jaime Muñoz</h1>
      <p class="subtitle">Explora todos mis proyectos web</p>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar proyecto..." autocomplete="off">
      </div>
    </header>

    <div class="stats">
      <div class="stat-item">
        <span class="stat-number" id="projectCount">0</span>
        <span class="stat-label">Proyectos</span>
      </div>
    </div>

    <div class="projects" id="projects"></div>

    <div class="linktree-section">
      <a href="https://linktr.ee/jaimemunoznicolas" target="_blank" rel="noopener" class="linktree-link">
        <span class="linktree-icon">🔗</span>
        <span>linktr.ee/jaimemunoznicolas</span>
        <span class="linktree-arrow">↗</span>
      </a>
    </div>

    <footer>
      <p>&copy; 2026 Jaime Muñoz &mdash; Todos los proyectos son funcionales</p>
    </footer>
  </div>

  <!-- Password Modal -->
  <div class="modal-overlay" id="passwordModal">
    <div class="modal">
      <div class="modal-icon">🔒</div>
      <h2>Sección Protegida</h2>
      <p>Introduce la contraseña para acceder a "Otros Proyectos"</p>
      <div class="modal-input-group">
        <input type="password" id="passwordInput" placeholder="Contraseña..." autocomplete="off">
        <button class="modal-toggle-vis" id="togglePassword" title="Mostrar/ocultar contraseña">👁️</button>
      </div>
      <div class="modal-error" id="modalError">Contraseña incorrecta</div>
      <div class="modal-buttons">
        <button class="modal-btn modal-cancel" id="modalCancel">Cancelar</button>
        <button class="modal-btn modal-confirm" id="modalConfirm">Acceder</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

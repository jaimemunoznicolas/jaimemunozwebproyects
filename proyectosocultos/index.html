<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zona Privada - Jaime Muñoz</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <div class="container">
    <header>
      <a href="../index.html" class="back-btn" id="backBtn">
        <span class="back-arrow">←</span>
        <span>Volver al menú principal</span>
      </a>
      <div class="avatar" id="avatar" role="button" tabindex="0">
        <div class="avatar-inner" id="avatarInner">
          <span class="avatar-letters">🔐</span>
        </div>
      </div>
      <h1>Zona Privada</h1>
      <p class="subtitle">Proyectos protegidos — Acceso autorizado</p>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar proyecto..." autocomplete="off">
      </div>
    </header>

    <div class="stats">
      <div class="stat-item">
        <span class="stat-number" id="projectCount">0</span>
        <span class="stat-label">Proyectos</span>
      </div>
    </div>

    <div class="projects" id="projects"></div>

    <footer>
      <p>&copy; 2026 Jaime Muñoz &mdash; Proyectos privados</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>

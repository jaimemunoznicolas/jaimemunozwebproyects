<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Calculadora</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="calc-container">
    <header class="calc-header">
      <a href="../index.html" class="back-btn">&larr; Volver al menú</a>
      <h1>Ultimate Calculadora</h1>
      <span class="mode-badge" id="modeBadge">DEG</span>
    </header>

    <div class="calc-body">
      <div class="display-area">
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
      </div>

      <div class="history-panel" id="historyPanel">
        <div class="history-header">
          <span>Historial</span>
          <button class="clear-history" id="clearHistory">&times;</button>
        </div>
        <div class="history-list" id="historyList"></div>
      </div>

      <div class="button-grid">
        <button class="btn func" data-action="clear">AC</button>
        <button class="btn func" data-action="backspace">⌫</button>
        <button class="btn func" data-action="percent">%</button>
        <button class="btn func" data-action="divide">÷</button>

        <button class="btn func" data-action="sin">sin</button>
        <button class="btn func" data-action="cos">cos</button>
        <button class="btn func" data-action="tan">tan</button>
        <button class="btn op" data-action="multiply">×</button>

        <button class="btn func" data-action="ln">ln</button>
        <button class="btn func" data-action="log">log</button>
        <button class="btn func" data-action="sqrt">√</button>
        <button class="btn op" data-action="subtract">−</button>

        <button class="btn func" data-action="square">x²</button>
        <button class="btn func" data-action="cube">x³</button>
        <button class="btn func" data-action="power">xⁿ</button>
        <button class="btn op" data-action="add">+</button>

        <button class="btn func" data-action="factorial">n!</button>
        <button class="btn func" data-action="inv">1/x</button>
        <button class="btn func" data-action="abs">|x|</button>
        <button class="btn func" data-action="toggleSign">±</button>

        <button class="btn num" data-value="7">7</button>
        <button class="btn num" data-value="8">8</button>
        <button class="btn num" data-value="9">9</button>
        <button class="btn func" data-action="cbrt">∛</button>

        <button class="btn num" data-value="4">4</button>
        <button class="btn num" data-value="5">5</button>
        <button class="btn num" data-value="6">6</button>
        <button class="btn func" data-action="pi">π</button>

        <button class="btn num" data-value="1">1</button>
        <button class="btn num" data-value="2">2</button>
        <button class="btn num" data-value="3">3</button>
        <button class="btn func" data-action="e">e</button>

        <button class="btn num zero" data-value="0">0</button>
        <button class="btn num" data-value=".">.</button>
        <button class="btn func" data-action="lparen">(</button>
        <button class="btn func" data-action="rparen">)</button>

        <button class="btn func" data-action="rand">rand</button>
        <button class="btn func" data-action="floor">floor</button>
        <button class="btn func" data-action="ceil">ceil</button>
        <button class="btn func" data-action="round">round</button>

        <button class="btn fn-wide" data-action="history">📜 Historial</button>
        <button class="btn fn-wide" data-action="degRad">DEG / RAD</button>
        <button class="btn equals" data-action="equals">=</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
